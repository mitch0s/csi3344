<script>
// constants
const websocket_url = "ws://127.0.0.1:8000/ws";
const websocket = new WebSocket(websocket_url);

websocket.addEventListener('open', () => {
    console.log('Websocket connected: ' + websocket_url);
})

websocket.addEventListener('message', (e) => {
    const event = JSON.parse(e.data);
    const data = event.data;
    switch (event.type) {
        case 'new_message': {
            for (let message of data) {
                console.log(`WS_MESSAGE: ${message.content}`);
            }
            break;
        }
        case 'live_user_count': {
            for (let message of data) {
                document.getElementById('live-user-count').innerText = "Live Users: " + message.value;
                break
            }
        }
    } 
})
