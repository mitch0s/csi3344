<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/stylesheet.css">
    <link rel="stylesheet" href="/table_stylesheet.css">

    <script type="module">
        import { createApp, onMounted } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';

        createApp({
            data() {
                return {
                    websocket_url: "ws://127.0.0.1:8000/ws",
                    websocket: null,
                    live_user_count: "-",
                    accounts: []
                }
            },

            methods: {
                handleAccountNavigate(account) {
                    console.log(account.id);
                    window.location = '/account/' + account.id;
                },

                logout() {
                    document.cookie = "";
                    window.location = "/login";
                },

                connectWebsocket() {
                    this.websocket = new WebSocket(this.websocket_url);

                    this.websocket.addEventListener('open', () => {
                        console.log('Websocket connected: ' + this.websocket_url);
                    });

                    this.websocket.addEventListener('message', (e) => {
                        const event = JSON.parse(e.data);
                        const data = event.data;

                        switch (event.type) {
                            case 'new_message': {
                                for (let message of data) {
                                    console.log(`WS_MESSAGE: ${message.content}`);
                                }
                                break;
                            }

                            case 'live_user_count': {
                                for (let message of data) {
                                    this.live_user_count = message.value;
                                    break;
                                }
                                break;
                            }
                        }
                    });

                    window.addEventListener('beforeunload', (event) => {
                        if (this.websocket) {
                            this.websocket.send(JSON.stringify({
                                type: "client_disconnect",
                                data: []
                            }));

                            this.websocket.close();
                        }

                        event.returnValue = '';
                    });
                },

                async getAccountList() {
                    const response = await fetch("/api/v1/account/list/", {
                        method: "GET",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + document.cookie
                        }
                    });
                    const body = await response.json();
                    console.log(body);
                    if (response.status != 200) { this.logout(); }
                    this.accounts = [];
                    for (var account of body.data) {
                        const t_account = {id: account.id, name: account.name, balance: account.balance_cents/100};
                        console.log(t_account); 
                        this.accounts.push(t_account);
                    }
                }
            },

            mounted() {
                this.connectWebsocket();
                this.getAccountList();
            }
        }).mount('#app');
    </script>
</head>

<body id="app" v-cloak style="display: flex; flex-direction: column; flex-grow: 1;">

    <div class="header spaced-container">
        <div class="header left-container" style="padding-left: 25px; gap: 20px;">
            <a class="header-text medium" href="/home">Home</a>
            <a class="header-text medium" href="/accounts">Accounts</a>
            <a class="header-text medium" href="/transfer">Transfer</a>
        </div>

        <div class="header right-container">
            <p class="header-text" style="padding-right: 2px; overflow: hidden;">Hello,</p>
            <a class="header-text underline" style="padding-right: 10px;" href="/profile">Mitch!</a>
            <a href="/profile">
                <img class="user-avatar" src="https://avatars.githubusercontent.com/u/67477144?v=4" height="64" width="64"/>
            </a>
        </div>
    </div>

    <div class="content"> </div>

    <div class="footer">
        <div style="display: flex; flex-direction: row; align-items: center; padding-left: 10px;">
            <p class="beacon"></p>
            <p class="header-text" style="padding-left: 10px;">Live Users: {{ live_user_count }}</p>
        </div>
    </div>

</body>
</html>
