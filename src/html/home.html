        </div>
        <div class="header right-container">
            <p class="header-text", style="padding-right: 2px; overflow: hidden;">Hello, </p>
            <a class="header-text underline", style="padding-right: 10px;" href="profile.html">Mitch!</a>
            <a href="profile.html"><img class="user-avatar" src="https://avatars.githubusercontent.com/u/67477144?v=4", height="64", width="64"></a>

    <div class="content">
        <table>
            <tr>

        </div>

<script>
// constants
const websocket_url = "ws://127.0.0.1:8000/ws";
const websocket = new WebSocket(websocket_url);

websocket.addEventListener('open', () => {
    console.log('Websocket connected: ' + websocket_url);
})

websocket.addEventListener('message', (e) => {
    const event = JSON.parse(e.data);
    const data = event.data;
    switch (event.type) {
        case 'new_message': {
            for (let message of data) {
                console.log(`WS_MESSAGE: ${message.content}`);
            }
            break;
        }
        case 'live_user_count': {
            for (let message of data) {
                document.getElementById('live-user-count').innerText = "Live Users: " + message.value;
                break
            }
        }
    } 
})

window.addEventListener('beforeunload', (event) => {
    if (websocket) {
        websocket.send({"type": "client_disconnect", "data": []})
        websocket.close();
    }
    // Chrome requires returnValue to be set to an empty string
    event.returnValue = ''; 
});

function handleButtonPress(element) {
    console.log(element.href);
    window.location = "https://neutron.au/";
}
</script>
